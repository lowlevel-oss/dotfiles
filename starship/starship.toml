format = "[ $user ]($style)"

# ========================
# Directory
# ========================

[directory]
style = "fg:mantle bg:teal"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "ŌĆ”/"

[directory.substitutions]
